<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<title>Scroll</title>

<style>

/* ===== BASE ===== */
body {
  font-family: Arial;
  background: #fff;
  margin: 0;
}

/* ===== WRAPPER ===== */
.slider {
  position: relative;
  padding: 40px 80px;
}

/* ===== CONTENEDOR ===== */
.container {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-behavior: smooth;
  scrollbar-width: none;
  align-items: flex-start;
  scroll-snap-type: x mandatory;
}

.container::-webkit-scrollbar {
  display: none;
}

/* ===== CARD ===== */
.card {
  flex: 0 0 280px;
  scroll-snap-align: start;
  scroll-snap-stop: always;

  background: #f9f9f9;
  border: 1px solid #ddd;
  border-bottom: 4px solid #17487f;
  border-radius: 8px 8px 0 0;
  overflow: hidden;

  text-decoration: none;
  color: inherit;
  display: block;
}

/* ===== IMAGEN ===== */
.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

/* ===== CONTENIDO ===== */
.card-content {
  padding: 15px;
}

.card h2 {
  margin: 0 0 8px;
  font-size: 19px;
  font-family: 'Roboto', sans-serif;
}

.card p {
  font-size: 14px;
  color: #555;
  font-family: 'Roboto', sans-serif;
  line-height: 1.5;
}

/* ===== BOTÓN ===== */
.ver-mas {
  display: inline-block;
  margin-top: 10px;
  font-size: 12px;
  background: #17487f;
  color: white;
  padding: 6px 12px;
  border-radius: 4px;
}

/* ===== FLECHAS ===== */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;

  background: transparent;
  border: none;
  color: #17487f;

  cursor: pointer;

  width: 80px;
  height: 80px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 60px;
  font-weight: bold;
}

.arrow.left { left: 10px; }
.arrow.right { right: 10px; }

/* ===== TABLET ===== */
@media (max-width: 1024px) and (min-width: 601px) {

  .container {
    flex-wrap: wrap;
    overflow-x: hidden;
    justify-content: center;
  }

  .card {
    flex: 1 1 calc(50% - 20px);
    max-width: none;
  }

  .arrow {
    display: none;
  }
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {

  .slider {
    padding: 20px;
  }

  .container {
    flex-direction: column;
    overflow-x: hidden;
  }

  .card {
    width: 100%;
    max-width: 100%;
    flex: none;
  }

  .arrow {
    display: none;
  }
}

</style>
</head>

<body>

<div class="slider">
  <button class="arrow left">‹</button>
  <button class="arrow right">›</button>

  <div class="container" id="cards"></div>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/1ftMlZ_tTzMZ0suW5sKYLbj9q8r57RoZq0nnz5Z8Hxyw/gviz/tq?tqx=out:json";

fetch(url)
  .then(res => res.text())
  .then(text => {

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;
    const container = document.getElementById("cards");

    rows.forEach((row, index) => {
      if (index === 0) return;

      const titulo = row.c[0]?.v;
      const descripcion = row.c[1]?.v;
      const imagen = row.c[2]?.v;
      const link = row.c[4]?.v;

      if (!titulo) return;

      const card = document.createElement(link ? "a" : "div");

      if (link) {
        card.href = link;
        card.target = "_blank";
      }

      card.classList.add("card");

      card.innerHTML = `
        <img src="${imagen}">
        <div class="card-content">
          <h2>${titulo}</h2>
          <p>${descripcion}</p>
          ${link ? '<span class="ver-mas">VER MÁS</span>' : ''}
        </div>
      `;

      container.appendChild(card);
    });

  })
  .catch(err => console.error(err));

/* ===== SCROLL CONTROL ===== */
const slider = document.getElementById("cards");

function getStep() {
  const card = document.querySelector(".card");
  if (!card) return 300;

  const gap = parseInt(getComputedStyle(slider).gap) || 20;
  return card.offsetWidth + gap;
}

document.querySelector(".left").onclick = () => {
  slider.scrollBy({ left: -getStep(), behavior: "smooth" });
};

document.querySelector(".right").onclick = () => {
  slider.scrollBy({ left: getStep(), behavior: "smooth" });
};

</script>

</body>
</html>
