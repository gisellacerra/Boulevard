<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<title>Carrousel</title>

<style>

/* ===== BASE ===== */
body {
  font-family: Arial;
  background: #fff;
  margin: 0;
}

/* ===== CONTENEDOR ===== */
.container {
  display: flex;
  overflow-x: auto;
  scroll-behavior: smooth;
  gap: 20px;

  padding: 40px 20px;
  margin-top: 30px; /* 👈 separación del navegador */

  scroll-snap-type: x mandatory;
  scrollbar-width: none;
}

.container::-webkit-scrollbar {
  display: none;
}

/* ===== BOTONES ===== */
.scroll-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;

  background: #17487f;
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 6px;
}

.left { left: 10px; }
.right { right: 10px; }

/* ===== CARD ===== */
.card {
  flex: 0 0 300px;
  max-width: 300px;

  display: flex;
  flex-direction: column; /* 👈 permite altura dinámica */

  background: white;
  border-bottom: 4px solid #17487f;

  border-radius: 8px 8px 0 0;
  overflow: hidden;

  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.3s;

  text-decoration: none;
  color: inherit;

  scroll-snap-align: start;
}

.card:hover {
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

/* ===== IMAGEN ===== */
.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  filter: grayscale(40%);
}

/* ===== CONTENIDO ===== */
.card-content {
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.card h2 {
  margin: 0 0 10px;
  font-size: clamp(18px, 2.5vw, 22px);
  font-family: 'Roboto', sans-serif;
  letter-spacing: 0.5px;
}

.card p {
  color: #222;
  font-size: clamp(12px, 2vw, 15px);
  line-height: 1.2;
  font-family: 'Roboto', sans-serif;
}

/* ===== BOTÓN ===== */
.ver-mas {
  margin-top: 15px;

  font-family: 'Roboto', sans-serif;
  font-size: 12px;

  background: #17487f;
  color: #fff;

  padding: 8px 16px;
  border-radius: 6px;

  display: inline-block;
}

/* ===== EFECTOS ===== */
.card.clickable {
  cursor: pointer;
}

.card.clickable:hover img {
  filter: brightness(0.7);
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .container {
    flex-direction: column;
    overflow-x: hidden;
    margin-top: 20px;
  }

  .card {
    width: 100%;
    max-width: 100%;
  }

  .card img {
    height: 140px;
  }

  .card h2 {
    font-size: 20px;
  }

  .card p {
    font-size: 14px;
  }
}

</style>
</head>

<body>

<!-- BOTONES -->
<button class="scroll-btn left">◀</button>
<button class="scroll-btn right">▶</button>

<!-- CONTENEDOR -->
<div class="container" id="cards"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/1ftMlZ_tTzMZ0suW5sKYLbj9q8r57RoZq0nnz5Z8Hxyw/gviz/tq?tqx=out:json";

fetch(url)
  .then(res => res.text())
  .then(text => {

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;
    const container = document.getElementById("cards");

    rows.forEach((row, index) => {
      if (index === 0) return;

      const titulo = row.c[0]?.v;
      const descripcion = row.c[1]?.v;
      const imagen = row.c[2]?.v;
      const link = row.c[4]?.v;

      if (!titulo) return;

      const card = document.createElement(link ? "a" : "div");

      if (link) {
        card.href = link;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.classList.add("clickable");
      }

      card.classList.add("card");

      card.innerHTML = `
        <img src="${imagen}">
        <div class="card-content">
          <h2>${titulo}</h2>
          <p>${descripcion}</p>
          ${link ? '<span class="ver-mas">VER MÁS</span>' : ''}
        </div>
      `;

      container.appendChild(card);
    });

  })
  .catch(err => console.error(err));

/* ===== SCROLL ===== */
const container = document.getElementById("cards");

document.querySelector(".left").onclick = () => {
  container.scrollBy({ left: -320, behavior: "smooth" });
};

document.querySelector(".right").onclick = () => {
  container.scrollBy({ left: 320, behavior: "smooth" });
};

</script>

</body>
</html>
