<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunicaciones_dos</title>

<style>
body {
  font-family: Arial;
  background: #fff;
  margin: 0;
}

.container {
  display: flex;
  gap: 20px;
  padding: 40px;
  flex-wrap: wrap;
  align-items: flex-start; 
}

.card {
  flex: 1 1 300px; 
  max-width: 300px;
  background: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  border-bottom: 5px solid;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  filter: grayscale(40%);
}

.card-content {
  padding: 20px;
}

.card h2 {
  margin: 0 0 10px;
}

.card p {
  color: #555;
  font-size: 14px;
}

/* Tablets */
@media (max-width: 1024px) {
  .container {
    justify-content: center;
  }

  .card {
    width: 45%;
  }
}

/* Celulares */
@media (max-width: 600px) {

    .container {
    flex-direction: column;
  }

  .card {
    flex: 1 1 100%;
    max-width: none;   
    width: 100%;
  }

  .card {
    width: 100%;
  }

  .card img {
    height: 140px;
  }

  .card h2 {
    font-size: 18px;
  }

  .card p {
    font-size: 13px;
  }

  .card {
    width: 100%;
  }
  
}


</style>
</head>

<body>

<div class="container" id="cards"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/1ftMlZ_tTzMZ0suW5sKYLbj9q8r57RoZq0nnz5Z8Hxyw/gviz/tq?tqx=out:json";

fetch(url)
  .then(res => res.text())
  .then(text => {

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    const container = document.getElementById("cards");

    rows.forEach((row, index) => {

      if (index === 0) return;

      const titulo = row.c[0]?.v;
      const descripcion = row.c[1]?.v;
      const imagen = row.c[2]?.v;
      const color = row.c[3]?.v;

      if (!titulo) return;

      const card = document.createElement("div");
      card.className = "card";
      card.style.borderColor = color;

      card.innerHTML = `
        <img src="${imagen}">
        <div class="card-content">
          <h2>${titulo}</h2>
          <p>${descripcion}</p>
        </div>
      `;

      container.appendChild(card);
    });

  })
  .catch(err => console.error(err));
</script>

</body>
</html>
