<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunicaciones_35</title>

<style>

/* ===== BASE ===== */
body {
  font-family: Arial;
  background: #fff;
  margin: 0;
}

/* ===== CONTENEDOR ===== */
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  padding: 40px;
  align-items: flex-start;
}

/* ===== CARD ===== */
.card {
  flex: 1 1 300px;
  max-width: 300px;
  background: white;
  border-bottom: 5px solid;
  border-radius: 8px;
  overflow: hidden;

  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.3s;

  text-decoration: none;
  color: inherit;
  display: block;

  position: relative;
}

.card:hover {
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

/* ===== IMAGEN ===== */
.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  filter: grayscale(40%);
}

/* ===== CONTENIDO ===== */
.card-content {
  padding: 20px;
}

.card h2 {
  margin: 0 0 10px;
  font-size: clamp(19px, 2.5vw, 22px);
}

.card p {
  color: #222;
  font-size: clamp(13px, 2vw, 16px);
  line-height: 1.3;
}

/* ===== CAPAS ===== */
.card img,
.card-content {
  position: relative;
  z-index: 1;
}

/* ===== OVERLAY ===== */
.card.clickable::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0);
  transition: background 0.3s ease;
  z-index: 2;
}

.card.clickable:hover::after {
  background: rgba(0, 0, 0, 0.35);
}

/* ===== TEXTO "VER MÁS" ===== */
.card.clickable::before {
  content: "VER MÁS";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -40%);

  color: white;
  font-weight: bold;
  font-size: 14px;
  letter-spacing: 1px;

  background: rgba(0, 0, 0, 0.6);
  padding: 8px 14px;
  border-radius: 4px;

  opacity: 0;
  transition: 0.3s;
  z-index: 3;
}

.card.clickable:hover::before {
  opacity: 1;
  transform: translate(-50%, -50%);
}

/* ===== EFECTOS CLICKABLE ===== */
.card.clickable {
  cursor: pointer;
}

.card.clickable:hover img {
  filter: brightness(0.7);
}

/* ===== RESPONSIVE ===== */

/* Tablets */
@media (max-width: 1024px) {
  .container {
    justify-content: center;
  }

  .card {
    width: 45%;
  }
}

/* Móviles */
@media (max-width: 600px) {
  .container {
    flex-direction: column;
    padding: 20px;
  }

  .card {
    flex: 1 1 100%;
    max-width: none;
  }

  .card img {
    height: 140px;
  }

  .card h2 {
    font-size: 18px;
  }

  .card p {
    font-size: 14px;
  }
}

</style>
</head>

<body>

<div class="container" id="cards"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/1ftMlZ_tTzMZ0suW5sKYLbj9q8r57RoZq0nnz5Z8Hxyw/gviz/tq?tqx=out:json";

fetch(url)
  .then(res => res.text())
  .then(text => {

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;
    const container = document.getElementById("cards");

    rows.forEach((row, index) => {
      if (index === 0) return;

      const titulo = row.c[0]?.v;
      const descripcion = row.c[1]?.v;
      const imagen = row.c[2]?.v;
      const color = row.c[3]?.v;
      const link = row.c[4]?.v;

      if (!titulo) return;

      const card = document.createElement(link ? "a" : "div");

      if (link) {
        card.href = link;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.classList.add("clickable");
      }

      card.classList.add("card");
      card.style.borderColor = color;

      card.innerHTML = `
        <img src="${imagen}">
        <div class="card-content">
          <h2>${titulo}</h2>
          <p>${descripcion}</p>
        </div>
      `;

      container.appendChild(card);
    });

  })
  .catch(err => console.error(err));
</script>

</body>
</html>
