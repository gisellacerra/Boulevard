<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cards desde Sheets</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
}

.container {
  display: flex;
  gap: 20px;
  padding: 40px;
  flex-wrap: wrap;
}

.card {
  width: 300px;
  background: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  border-bottom: 5px solid;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  filter: grayscale(40%);
}

.card-content {
  padding: 20px;
}

.card h2 {
  margin: 0 0 10px;
}

.card p {
  color: #555;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container" id="cards"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/1ftMlZ_tTzMZ0suW5sKYLbj9q8r57RoZq0nnz5Z8Hxyw/gviz/tq?tqx=out:json";

fetch(url)
  .then(res => res.text())
  .then(text => {
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const rows = json.table.rows;

    const data = rows.map(row => ({
      titulo: row.c[0]?.v,
      descripcion: row.c[1]?.v,
      imagen: row.c[2]?.v,
      color: row.c[3]?.v
    }));

    console.log(data);

    const container = document.getElementById("cards");

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${item.imagen}">
        <div class="card-content">
          <h3>${item.titulo}</h3>
          <p>${item.descripcion}</p>
        </div>
        <div class="barra" style="background:${item.color}"></div>
      `;

      container.appendChild(card);
    });

  });

</body>
</html>
