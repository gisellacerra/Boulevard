<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
<title>Scroller_06</title>

<style>

/* ===== BASE ===== */
body {
  font-family: Arial;
  background: #fff;
  margin: 0;
}

/* ===== WRAPPER ===== */
.slider {
  position: relative;
  padding: 40px 40px;
}

.arrow.right {
  right: 40px; 
}

.arrow.left {
  left: 40px;
}

/* ===== CONTENEDOR ===== */
.container {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-behavior: smooth;
  scrollbar-width: none;
  align-items: flex-start;
  scroll-snap-type: x mandatory;
}

.container::-webkit-scrollbar {
  display: none;
}

/* ===== CARD (4 EXACTAS) ===== */
.card {
  flex: 0 0 calc((100% - 60px) / 4); /* 👈 CLAVE */
  scroll-snap-align: start;

  background: #f9f9f9;
  border: 1px solid #ddd;
  border-bottom: 4px solid #17487f;
  border-radius: 8px 8px 0 0;
  overflow: hidden;

  text-decoration: none;
  color: inherit;
  display: block;
}

/* ===== IMAGEN ===== */
.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

/* ===== CONTENIDO ===== */
.card-content {
  padding: 15px;
}

.card h2 {
  margin: 0 0 8px;
  font-size: 19px;
  font-family: 'Roboto', sans-serif;
  line-height: 1.2;
}

.card p {
  font-size: 14px;
  color: #555;
  font-family: 'Roboto', sans-serif;
  line-height: 1.4;
}

/* ===== BOTÓN ===== */
.ver-mas {
  display: inline-block;
  margin-top: 10px;
  font-size: 12px;
  background: #1399af;
  color: white;
  padding: 6px 12px;
  border-radius: 4px;
}

/* ===== FLECHAS ===== */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;

  width: 18px;
  height: 18px;

  border: solid #17487f;
  border-width: 0 4px 4px 0;

  cursor: pointer;
  background: transparent;
}

.arrow.right {
  right: 40px;
  transform: translateY(-50%) rotate(-45deg);
}

.arrow.left {
  left: 40px;
  transform: translateY(-50%) rotate(135deg);
}

/* ===== TABLET (2 columnas) ===== */
@media (max-width: 1024px) {

  .container {
    flex-wrap: wrap;
    overflow-x: hidden;
    justify-content: center;
  }

  .card {
    flex: 0 0 calc((100% - 20px) / 2);
  }

  .arrow {
    display: none;
  }
}

/* ===== MOBILE (1 columna) ===== */
@media (max-width: 600px) {

  .slider {
    padding: 20px;
  }

  .container {
    flex-direction: column;
    overflow-x: hidden;
  }

  .card {
    flex: 0 0 100%;
  }

  .arrow {
    display: none;
  }
}

</style>
</head>

<body>

<div class="slider">
  <button class="arrow left"></button>
  <button class="arrow right"></button>

  <div class="container" id="cards"></div>
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbyLIuyS-H5RMuX0Nrcv51rqZ8UbOng2tvfdQdAoyFZkCDVDPdjG8MHgy-QwMrVQb-Ox/exec?token=Comunicacion_PJ";

fetch(url)
  .then(res => res.json())
  .then(rows => {

    const container = document.getElementById("cards");

    rows.forEach(row => {
      const { titulo, descripcion, imagen, link } = row;
      if (!titulo) return;

      const card = document.createElement(link ? "a" : "div");

      if (link) {
        card.href = link;
        card.target = "_blank";
      }

      card.classList.add("card");

      card.innerHTML = `
        <img src="${imagen}">
        <div class="card-content">
          <h2>${titulo}</h2>
          <p>${descripcion}</p>
          ${link ? '<span class="ver-mas">VER MÁS</span>' : ''}
        </div>
      `;

      container.appendChild(card);
    });

    const slider = document.getElementById("cards");

    function getStep() {
      const card = document.querySelector(".card");
      if (!card) return 300;
      const gap = parseInt(getComputedStyle(slider).gap) || 20;
      return card.offsetWidth + gap;
    }

    document.querySelector(".left").onclick = () => {
      slider.scrollBy({
        left: -getStep() * 4, /* 👈 ahora salta de a 4 */
        behavior: "smooth"
      });
    };

    document.querySelector(".right").onclick = () => {
      slider.scrollBy({
        left: getStep() * 4,
        behavior: "smooth"
      });
    };

  })
  .catch(err => console.error(err));

</script>

</body>
</html>
