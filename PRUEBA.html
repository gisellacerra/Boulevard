<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cards desde Sheets</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
}

.container {
  display: flex;
  gap: 20px;
  padding: 40px;
  flex-wrap: wrap;
}

.card {
  width: 300px;
  background: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  border-bottom: 5px solid;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  filter: grayscale(40%);
}

.card-content {
  padding: 20px;
}

.card h2 {
  margin: 0 0 10px;
}

.card p {
  color: #555;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container" id="cards"></div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1ftMlZ_tTzMZ0suW5sKYLbj9q8r57RoZq0nnz5Z8Hxyw/edit?usp=sharing";

fetch(URL)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("cards");

    data.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.style.borderBottomColor = item.color;

      card.innerHTML = `
        <img src="${item.imagen}">
        <div class="card-content">
          <h2>${item.titulo}</h2>
          <p>${item.descripcion}</p>
        </div>
      `;

      container.appendChild(card);
    });
  });
</script>

</body>
</html>
