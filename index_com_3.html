<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comunicaciones_3</title>

<style>
body {
  font-family: Arial;
  background: #fff;
  margin: 0;
}

.container {
  display: flex;
  gap: 20px;
  padding: 40px;
  flex-wrap: wrap;
  align-items: flex-start; 
}

.card {
  flex: 1 1 300px; 
  max-width: 300px;
  background: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  border-bottom: 5px solid;
  transition: 0.3s;
  border-radius: 8px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  display: block; 
  position: relative; 
  overflow: hidden;
}

.card:hover {
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  filter: grayscale(40%);
}

.card-content {
  padding: 20px;
}

.card h2 {
  margin: 0 0 10px;
  font-size: clamp(20px, 2.5vw, 23px);
}

.card p {
  color: #222222;
 font-size: clamp(13px, 2vw, 16px);
  line-height: 1.3;
}

.card.clickable::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0);
  transition: background 0.3s ease;
  pointer-events: none;
  z-index: 2;
}

.card img,
.card-content {
  position: relative;
  z-index: 1;
}

.card.clickable:hover::after {
  background: rgba(8, 0, 125, 0.4); 
}

.card.clickable {
  cursor: pointer;
}


/* Tablets */
@media (max-width: 1024px) {
  .container {
    justify-content: center;
  }

  .card {
    width: 45%;
  }
}

/* Celulares */
@media (max-width: 600px) {

    .container {
    flex-direction: column;
  }

  .card {
    flex: 1 1 100%;
    max-width: none;   
    width: 100%;
  }

  .card {
    width: 100%;
  }

  .card img {
    height: 140px;
  }

  .card h2 {
    font-size: 18px;
  }

  .card p {
    font-size: 14px;
  }

  .card {
    width: 100%;
  }
  
}


</style>
</head>

<body>

<div class="container" id="cards"></div>

<script>
const url = "https://docs.google.com/spreadsheets/d/1ftMlZ_tTzMZ0suW5sKYLbj9q8r57RoZq0nnz5Z8Hxyw/gviz/tq?tqx=out:json";

fetch(url)
  .then(res => res.text())
  .then(text => {

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    const container = document.getElementById("cards");

    rows.forEach((row, index) => {

      if (index === 0) return;

      const titulo = row.c[0]?.v;
      const descripcion = row.c[1]?.v;
      const imagen = row.c[2]?.v;
      const color = row.c[3]?.v;
      const link = row.c[4]?.v;

      if (!titulo) return;

      const card = document.createElement(link ? "a" : "div");

      if (link) {
        card.href = link;
        card.target = "_blank";
        card.style.textDecoration = "none";
        card.style.color = "inherit";
      }


      
      card.className = "card";
      card.style.borderColor = color;

      card.innerHTML = `
        <img src="${imagen}">
        <div class="card-content">
          <h2>${titulo}</h2>
          <p>${descripcion}</p>
        </div>
      `;

      container.appendChild(card);
    });

  })
  .catch(err => console.error(err));
</script>

</body>
</html>
